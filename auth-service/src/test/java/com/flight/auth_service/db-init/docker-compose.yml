version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: loyalty-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    container_name: loyalty-redis
    restart: always
    ports:
      - "6379:6379"

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    depends_on:
      - postgres
      - redis
    ports:
      - "8081:8081"

volumes:
  postgres_data: